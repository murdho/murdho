<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 752 378" width="752" height="378">
  <defs>
    <style>
      text, tspan { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>

    <clipPath id="windowClip">
      <rect width="752" height="378" rx="10"/>
    </clipPath>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#windowClip)">
    <!-- Terminal title bar -->
    <rect width="752" height="30" fill="#161b22"/>
    <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="15" r="5" fill="#febc2e"/>
    <circle cx="56" cy="15" r="5" fill="#28c840"/>
    <text x="376" y="19" text-anchor="middle" font-size="11" fill="#7a8490">murdho@murdho.com</text>

    <!-- Terminal body -->
    <rect y="30" width="752" height="348" fill="#0d1117"/>

    <!-- YAML content -->
    <g>
      <text x="16" y="56" font-size="13">
        <tspan fill="#00ff88">❯</tspan>
        <tspan fill="#6e7681"> bat profile.yaml</tspan>
      </text>

      <text x="16" y="82" font-size="13">
        <tspan fill="#ff7b72">name</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">Murdho</tspan>
      </text>

      <text x="16" y="104" font-size="13">
        <tspan fill="#ff7b72">role</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">VP of Engineering</tspan>
      </text>

      <text x="16" y="126" font-size="13">
        <tspan fill="#ff7b72">current_location</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">Helsinki, Finland 🇫🇮</tspan>
      </text>

      <text x="16" y="148" font-size="13">
        <tspan fill="#ff7b72">first_appeared_in</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">Tallinn, Estonia 🇪🇪</tspan>
      </text>

      <text x="16" y="174" font-size="13">
        <tspan fill="#ff7b72">focus</tspan><tspan fill="#8b949e">:</tspan>
      </text>
      <text x="32" y="194" font-size="13">
        <tspan fill="#8b949e">- </tspan><tspan fill="#a5d6ff">Automotive Data Intelligence</tspan>
      </text>
      <text x="32" y="214" font-size="13">
        <tspan fill="#8b949e">- </tspan><tspan fill="#a5d6ff">Building with AI × Rails</tspan>
      </text>
      <text x="32" y="234" font-size="13">
        <tspan fill="#8b949e">- </tspan><tspan fill="#a5d6ff">Solopreneur Side Quests</tspan>
      </text>
    </g>

    <!-- Tech stack pills -->
    <text x="16" y="270" font-size="10" fill="#6e7681" letter-spacing="2">TOOLS</text>
    <line x1="56" y1="267" x2="176" y2="267" stroke="#30363d" stroke-width="1"/>

    <!-- Row 1 -->
    <g>
      <rect x="16" y="280" width="56" height="22" rx="4" fill="#cc342d20" stroke="#cc342d" stroke-width="0.7"/>
      <text x="44" y="295" text-anchor="middle" font-size="10" fill="#cc342d">Ruby</text>
    </g>
    <g>
      <rect x="80" y="280" width="52" height="22" rx="4" fill="#d1380020" stroke="#d13800" stroke-width="0.7"/>
      <text x="106" y="295" text-anchor="middle" font-size="10" fill="#ff6b35">Rails</text>
    </g>
    <g>
      <rect x="140" y="280" width="72" height="22" rx="4" fill="#00add820" stroke="#00add8" stroke-width="0.7"/>
      <text x="176" y="295" text-anchor="middle" font-size="10" fill="#00c8ff">Hotwire</text>
    </g>
    <g>
      <rect x="220" y="280" width="38" height="22" rx="4" fill="#00acd720" stroke="#00acd7" stroke-width="0.7"/>
      <text x="239" y="295" text-anchor="middle" font-size="10" fill="#00d4ff">Go</text>
    </g>
    <g>
      <rect x="266" y="280" width="90" height="22" rx="4" fill="#33679120" stroke="#336791" stroke-width="0.7"/>
      <text x="311" y="295" text-anchor="middle" font-size="10" fill="#6c9bff">PostgreSQL</text>
    </g>

    <!-- Row 2 -->
    <g>
      <rect x="16" y="310" width="60" height="22" rx="4" fill="#003b5720" stroke="#003b57" stroke-width="0.7"/>
      <text x="46" y="325" text-anchor="middle" font-size="10" fill="#44a5c2">SQLite</text>
    </g>
    <g>
      <rect x="84" y="310" width="64" height="22" rx="4" fill="#ffcc0020" stroke="#ffcc00" stroke-width="0.7"/>
      <text x="116" y="325" text-anchor="middle" font-size="10" fill="#ffcc00">DuckDB</text>
    </g>
    <g>
      <rect x="156" y="310" width="68" height="22" rx="4" fill="#5e439020" stroke="#5e4390" stroke-width="0.7"/>
      <text x="190" y="325" text-anchor="middle" font-size="10" fill="#a78bfa">Clojure</text>
    </g>
    <g>
      <rect x="232" y="310" width="98" height="22" rx="4" fill="#ff660020" stroke="#ff6600" stroke-width="0.7"/>
      <text x="281" y="325" text-anchor="middle" font-size="10" fill="#ff8833">WebAssembly</text>
    </g>
    <g>
      <rect x="338" y="310" width="84" height="22" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="0.7"/>
      <text x="380" y="325" text-anchor="middle" font-size="10" fill="#00ff88">Hypermedia</text>
    </g>

    <!-- Status bar -->
    <text x="16" y="358" font-size="10" fill="#6e7681">
      <tspan fill="#00ff88">●</tspan> touching grass
    </text>
    <text x="376" y="358" text-anchor="middle" font-size="10" fill="#6e7681">
      13+ years shipping code
    </text>
    <text x="736" y="358" text-anchor="end" font-size="10" fill="#6e7681">
      <tspan fill="#ff6b35">♥</tspan> open source
    </text>
  </g>

  <!-- Rounded border -->
  <rect width="752" height="378" rx="10" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>

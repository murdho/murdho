<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <style>
      text, tspan { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>

    <clipPath id="windowClip">
      <rect x="30" y="20" width="660" height="360" rx="10"/>
    </clipPath>

    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Shadow layer -->
  <rect x="30" y="20" width="660" height="360" rx="10" fill="#0d1117" filter="url(#shadow)"/>

  <g clip-path="url(#windowClip)">
    <!-- Terminal title bar -->
    <rect x="30" y="20" width="660" height="30" fill="#161b22"/>
    <circle cx="50" cy="35" r="5" fill="#ff5f57"/>
    <circle cx="68" cy="35" r="5" fill="#febc2e"/>
    <circle cx="86" cy="35" r="5" fill="#28c840"/>
    <text x="360" y="39" text-anchor="middle" font-size="11" fill="#7a8490">murdho@murdho.com</text>

    <!-- Terminal body -->
    <rect x="30" y="50" width="660" height="330" fill="#0d1117"/>

    <!-- YAML content -->
    <g>
      <text x="46" y="76" font-size="13">
        <tspan fill="#00ff88">=&gt;</tspan>
        <tspan fill="#6e7681"> bat profile.yaml</tspan>
      </text>

      <text x="46" y="102" font-size="13">
        <tspan fill="#ff7b72">name</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">Murdho</tspan>
      </text>

      <text x="46" y="124" font-size="13">
        <tspan fill="#ff7b72">role</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">VP of Engineering</tspan>
      </text>

      <text x="46" y="146" font-size="13">
        <tspan fill="#ff7b72">current_location</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">Helsinki, Finland 🇫🇮</tspan>
      </text>

      <text x="46" y="168" font-size="13">
        <tspan fill="#ff7b72">first_appeared_in</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#a5d6ff">Tallinn, Estonia 🇪🇪</tspan>
      </text>

      <text x="46" y="190" font-size="13">
        <tspan fill="#ff7b72">focus</tspan><tspan fill="#8b949e">:</tspan>
      </text>
      <text x="62" y="210" font-size="13">
        <tspan fill="#8b949e">- </tspan><tspan fill="#a5d6ff">Automotive Data Intelligence</tspan>
      </text>
      <text x="62" y="230" font-size="13">
        <tspan fill="#8b949e">- </tspan><tspan fill="#a5d6ff">Building with AI × Rails</tspan>
      </text>
      <text x="62" y="250" font-size="13">
        <tspan fill="#8b949e">- </tspan><tspan fill="#a5d6ff">Solopreneur Side Quests</tspan>
      </text>
    </g>

    <!-- Tech stack pills -->
    <text x="46" y="272" font-size="13">
      <tspan fill="#ff7b72">tools</tspan><tspan fill="#8b949e">:</tspan>
    </text>

    <!-- Row 1 -->
    <g>
      <rect x="62" y="282" width="56" height="22" rx="4" fill="#cc342d20" stroke="#cc342d" stroke-width="0.7"/>
      <text x="90" y="297" text-anchor="middle" font-size="10" fill="#cc342d">Ruby</text>
    </g>
    <g>
      <rect x="126" y="282" width="52" height="22" rx="4" fill="#d1380020" stroke="#d13800" stroke-width="0.7"/>
      <text x="152" y="297" text-anchor="middle" font-size="10" fill="#ff6b35">Rails</text>
    </g>
    <g>
      <rect x="186" y="282" width="72" height="22" rx="4" fill="#00add820" stroke="#00add8" stroke-width="0.7"/>
      <text x="222" y="297" text-anchor="middle" font-size="10" fill="#00c8ff">Hotwire</text>
    </g>
    <g>
      <rect x="266" y="282" width="38" height="22" rx="4" fill="#00acd720" stroke="#00acd7" stroke-width="0.7"/>
      <text x="285" y="297" text-anchor="middle" font-size="10" fill="#00d4ff">Go</text>
    </g>
    <g>
      <rect x="312" y="282" width="90" height="22" rx="4" fill="#33679120" stroke="#336791" stroke-width="0.7"/>
      <text x="357" y="297" text-anchor="middle" font-size="10" fill="#6c9bff">PostgreSQL</text>
    </g>

    <!-- Row 2 -->
    <g>
      <rect x="62" y="312" width="60" height="22" rx="4" fill="#003b5720" stroke="#003b57" stroke-width="0.7"/>
      <text x="92" y="327" text-anchor="middle" font-size="10" fill="#44a5c2">SQLite</text>
    </g>
    <g>
      <rect x="130" y="312" width="64" height="22" rx="4" fill="#ffcc0020" stroke="#ffcc00" stroke-width="0.7"/>
      <text x="162" y="327" text-anchor="middle" font-size="10" fill="#ffcc00">DuckDB</text>
    </g>
    <g>
      <rect x="202" y="312" width="68" height="22" rx="4" fill="#5e439020" stroke="#5e4390" stroke-width="0.7"/>
      <text x="236" y="327" text-anchor="middle" font-size="10" fill="#a78bfa">Clojure</text>
    </g>
    <g>
      <rect x="278" y="312" width="98" height="22" rx="4" fill="#ff660020" stroke="#ff6600" stroke-width="0.7"/>
      <text x="327" y="327" text-anchor="middle" font-size="10" fill="#ff8833">WebAssembly</text>
    </g>
    <g>
      <rect x="384" y="312" width="84" height="22" rx="4" fill="#00ff8820" stroke="#00ff88" stroke-width="0.7"/>
      <text x="426" y="327" text-anchor="middle" font-size="10" fill="#00ff88">Hypermedia</text>
    </g>

    <!-- Status bar -->
    <text x="46" y="362" font-size="10" fill="#6e7681">
      <tspan fill="#00ff88">●</tspan> touching grass
    </text>
    <text x="360" y="362" text-anchor="middle" font-size="10" fill="#6e7681">
      13+ years shipping code
    </text>
    <text x="674" y="362" text-anchor="end" font-size="10" fill="#6e7681">
      <tspan fill="#ff6b35">♥</tspan> open source
    </text>
  </g>

  <!-- Rounded border -->
  <rect x="30" y="20" width="660" height="360" rx="10" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>
